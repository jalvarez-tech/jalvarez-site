'$schema': https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: 'Medidor (metric card)'
status: stable
description: 'Big metric value + small key + optional note, used in §03 Resultados or in card-proyecto.'
props:
  type: object
  properties:
    value: { type: string, examples: ['1.4s', '−38%', 'AA'] }
    unit:  { type: string, description: 'Optional small unit suffix (e.g. "+ años", "%", "h")' }
    key:   { type: string, examples: ['LCP', 'Peso', 'A11y'] }
    note:  { type: string, examples: ['verificado con datos de campo'] }
    variant: { type: string, enum: [flat, card], default: flat }
