$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: 'Medidor (metric card)'
status: stable
description: 'Big metric value + small key + optional note, used in §03 Resultados or in card-proyecto.'
libraries:
  - byte/global

props:
  type: object
  properties:
    value:
      type: string
      title: Value
      examples:
        - 1.4s
        - −38%
        - AA
    unit:
      type: string
      title: Unit
      description: 'Optional small unit suffix (e.g. "+ años", "%", "h")'
    key:
      type: string
      title: Key
      examples:
        - LCP
        - Peso
        - A11y
    note:
      type: string
      title: Note
      examples:
        - 'verificado con datos de campo'
    variant:
      type: string
      title: Variant
      enum:
        - flat
        - card
      default: flat
