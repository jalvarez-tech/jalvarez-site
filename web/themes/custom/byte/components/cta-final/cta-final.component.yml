$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: 'CTA final'
status: stable
description: 'Centered call-to-action band with display title (with optional italic fragment), sub, and primary + ghost buttons.'
props:
  type: object
  properties:
    title:
      type: string
      title: Title
      examples:
        - 'Si crees lo mismo,'
    title_em:
      type: string
      title: 'Italic accent fragment'
      examples:
        - 'construyamos algo juntos.'
    sub:
      type: string
      title: Sub
    primary_label:
      type: string
      title: 'Primary label'
      examples:
        - 'Iniciar tu proyecto'
    primary_href:
      type: string
      title: 'Primary href'
      examples:
        - /contacto
    secondary_label:
      type: string
      title: 'Secondary label'
      examples:
        - 'Revisar mi trabajo'
    secondary_href:
      type: string
      title: 'Secondary href'
      examples:
        - /proyectos
