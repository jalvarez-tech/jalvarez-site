$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: 'Card Proyecto'
status: stable
description: 'Project teaser card: cover media (or browser-mock placeholder) + chips + name with arrow + desc + metrics row.'
props:
  type: object
  properties:
    name:
      type: string
      title: Name
    href:
      type: string
      title: Href
    category:
      type: string
      title: Category
      description: 'Stack / category chip (accent variant)'
    year:
      type: string
      title: Year
    description:
      type: string
      title: Description
    cover_url:
      type: string
      title: 'Cover url'
      description: 'If present, used as background of the cover slot'
    hue:
      type: integer
      title: Hue
      description: 'OKLCH hue 0-360 for placeholder mock'
    m1_value:
      type: string
      title: 'Metric 1 — value'
      examples: ['1.4s']
    m1_key:
      type: string
      title: 'Metric 1 — key'
      examples: ['LCP']
    m2_value:
      type: string
      title: 'Metric 2 — value'
      examples: ['−38%']
    m2_key:
      type: string
      title: 'Metric 2 — key'
      examples: ['Peso']
    m3_value:
      type: string
      title: 'Metric 3 — value'
    m3_key:
      type: string
      title: 'Metric 3 — key'
