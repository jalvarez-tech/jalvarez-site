$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: 'Case step card'
status: stable
description: 'Numbered step card for §02 Enfoque inside a Project detail. Shows: tag (mono accent), title (display), body (muted).'
props:
  type: object
  properties:
    number:
      type: integer
      title: Number
      examples:
        - 1
        - 2
        - 3
        - 4
    tag:
      type: string
      title: Tag
      examples:
        - 'Semana 1'
    title:
      type: string
      title: Title
    body:
      type: string
      title: Body
