$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: 'Card Testimonio'
status: stable
description: 'Testimonial card: serif quote with accent quote marks + author chip.'
libraries:
  - byte/global

props:
  type: object
  properties:
    quote:
      type: string
      title: Quote
    name:
      type: string
      title: Name
    role:
      type: string
      title: Role
    initials:
      type: string
      title: Initials
