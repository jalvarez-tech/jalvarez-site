$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: 'Método (Process)'
status: stable
description: 'Section header (eyebrow + title) followed by a process list. Drop process-row components into the steps slot.'
props:
  type: object
  properties:
    eyebrow_label:
      type: string
      title: 'Eyebrow label'
      examples:
        - 'el método'
    eyebrow_number:
      type: integer
      title: 'Eyebrow number'
      examples:
        - 3
    title:
      type: string
      title: Title
    title_em:
      type: string
      title: 'Italic accent fragment'
slots:
  steps:
    title: 'Process steps'
    description: 'Drop one or more process-row components here.'
