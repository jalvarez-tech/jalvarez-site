$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: 'Nav glass (top)'
status: stable
noUi: true
description: 'Liquid-glass fixed top nav: brand monogram + nav links + CTA + lang toggle. Rendered programmatically by jalvarez_nav_glass block (links built from the active route + language). Hidden from Canvas editor by design.'
libraries:
  - byte/global

props:
  type: object
  properties:
    brand_initial:
      type: string
      title: 'Brand initial'
      default: J
    brand_name:
      type: string
      title: 'Brand name'
      default: jalvarez
    brand_tld:
      type: string
      title: 'Brand tld'
      default: .tech
    links:
      type: array
      title: Links
      description: 'Menu links to render in the nav'
      items:
        type: object
        properties:
          label: { type: string }
          href: { type: string }
          active: { type: boolean }
    cta_label:
      type: string
      title: 'Cta label'
      default: Disponible
    cta_href:
      type: string
      title: 'Cta href'
      default: /contacto
    show_lang_toggle:
      type: boolean
      title: 'Show lang toggle'
      default: true
    current_lang:
      type: string
      title: 'Current lang'
      enum:
        - es
        - en
      default: es
    lang_es_href:
      type: string
      title: 'Spanish toggle href'
      default: /es
    lang_en_href:
      type: string
      title: 'English toggle href'
      default: /en
    # i18n strings — injected by NavGlassBlock via $this->t() so the SDC
    # itself stays language-agnostic. Defaults are present for the Canvas
    # editor preview; the block always overrides them at render time.
    i18n_open_menu:
      type: string
      title: 'i18n: open menu'
      default: 'Open menu'
    i18n_close_menu:
      type: string
      title: 'i18n: close menu'
      default: 'Close menu'
    i18n_toggle_theme:
      type: string
      title: 'i18n: toggle theme'
      default: 'Toggle theme'
    i18n_language:
      type: string
      title: 'i18n: language switcher label'
      default: 'Language'
    i18n_primary_nav:
      type: string
      title: 'i18n: primary nav label'
      default: 'Primary'
