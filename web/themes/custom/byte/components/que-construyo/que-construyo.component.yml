'$schema': https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: 'Qué construyo (Featured projects)'
status: stable
description: 'Section + 3 project cards in grid + CTA "Ver todo el trabajo".'
props:
  type: object
  properties:
    eyebrow_label: { type: string }
    eyebrow_number: { type: integer }
    title: { type: string }
    title_em: { type: string }
    lede: { type: string }
    items:
      type: array
      items:
        type: object
    cta_label: { type: string, examples: ['Ver todo el trabajo'] }
    cta_href: { type: string, examples: ['/proyectos'] }
