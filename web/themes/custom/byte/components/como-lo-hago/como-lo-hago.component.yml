$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: 'Cómo lo hago (Values)'
status: stable
description: 'Section header (eyebrow + title) followed by a values grid. Drop value-card components into the values slot.'
libraries:
  - byte/global

props:
  type: object
  properties:
    eyebrow_label:
      type: string
      title: 'Eyebrow label'
      examples:
        - 'cómo lo hago'
    eyebrow_number:
      type: integer
      title: 'Eyebrow number'
      examples:
        - 1
    title:
      type: string
      title: Title
      examples:
        - 'No vendo features. '
    title_em:
      type: string
      title: 'Italic accent fragment'
      examples:
        - 'Defiendo cuatro disciplinas no negociables.'
slots:
  values:
    title: 'Value cards'
    description: 'Drop one or more value-card components here.'
