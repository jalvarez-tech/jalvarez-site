$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: Button
status: stable
description: 'Pill button. Variants: primary (green→hover orange), ghost (outline). Optional →.'
props:
  type: object
  properties:
    label:
      type: string
      title: Label
      examples:
        - 'Iniciar tu proyecto'
        - 'Ver el trabajo'
    href:
      type: string
      title: URL
    variant:
      type: string
      title: Variant
      enum:
        - primary
        - ghost
      default: primary
    size:
      type: string
      title: Size
      enum:
        - default
        - sm
      default: default
    arrow:
      type: boolean
      title: 'Show arrow'
      default: false
    tag:
      type: string
      title: Tag
      enum:
        - a
        - button
      default: a
