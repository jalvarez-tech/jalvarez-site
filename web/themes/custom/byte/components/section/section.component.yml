$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: Section
status: stable
description: 'Editorial section wrapper. Two-column head (eyebrow + title/lede). Slot for body.'
libraries:
  - byte/global

props:
  type: object
  properties:
    eyebrow_label:
      type: string
      title: 'Eyebrow label'
      examples:
        - 'cómo lo hago'
    eyebrow_number:
      type: integer
      title: 'Eyebrow number'
      examples:
        - 1
    title:
      type: string
      title: Title
      examples:
        - 'No vendo features.'
    title_em:
      type: string
      title: 'Italic accent fragment of the title'
      examples:
        - 'Defiendo cuatro disciplinas no negociables.'
    lede:
      type: string
      title: 'Optional supporting paragraph'
slots:
  default:
    title: 'Section body'
