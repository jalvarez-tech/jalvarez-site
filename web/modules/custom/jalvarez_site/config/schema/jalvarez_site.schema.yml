block.settings.jalvarez_projects_grid:
  type: block_settings
  label: 'Proyectos — grid (byte cards)'
  mapping:
    only_featured:
      type: boolean
      label: 'Solo proyectos destacados (field_featured_home)'
    limit:
      type: integer
      label: 'Límite de proyectos'
    wrap:
      type: string
      label: 'Modo de wrapper HTML'
      constraints:
        Choice:
          - section
          - grid
          - none

# Block plugins below have no custom block-level settings (no
# defaultConfiguration() override + no blockForm()). Drupal still requires
# a typed schema entry for every block.settings.<plugin_id> config tree,
# otherwise `drush cim` warns about "missing schema for ...".
block.settings.jalvarez_notes_grid:
  type: block_settings
  label: 'Notas — list (byte rows)'
  mapping: {}

block.settings.jalvarez_nav_glass:
  type: block_settings
  label: 'Byte top navigation'
  mapping: {}

block.settings.jalvarez_footer:
  type: block_settings
  label: 'Byte site footer'
  mapping: {}
