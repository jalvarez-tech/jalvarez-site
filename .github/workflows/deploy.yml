name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Pin this job to the `production` GitHub Environment. The Environment
    # is what holds `secrets.HOSTINGER_*` and (once configured in the repo
    # Settings → Environments → production) any required reviewers,
    # deployment branch restrictions and wait timer. Configuring required
    # reviewers there means a deploy can't go out without an explicit
    # human approval click — see docs/DEPLOYMENT.md § GitHub Environment
    # for the one-time setup checklist.
    environment:
      name: production
      url: https://jalvarez.tech
    env:
      THEME_DIR: web/themes/custom/byte
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ───── PHP + Composer ─────
      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: gd, mbstring, xml, curl, intl, pdo_mysql, zip, opcache

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Composer install (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ───── Node + theme build ─────
      - name: Set up Node 20 (no cache — first run, no lock)
        if: ${{ hashFiles('web/themes/custom/byte/package-lock.json') == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Node 20 (with cache)
        if: ${{ hashFiles('web/themes/custom/byte/package-lock.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/themes/custom/byte/package-lock.json

      - name: Install theme dependencies
        working-directory: ${{ env.THEME_DIR }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      # Stamp the theme library with the commit SHA so the aggregated
      # CSS/JS bundle URL changes on every deploy. Drupal includes the
      # `version:` value in the bundle hash; without this bump the URL
      # would stay constant across deploys and browsers / Hostinger HCDN
      # would keep serving stale copies even after `drush cr`.
      - name: Stamp library version with commit SHA
        working-directory: ${{ env.THEME_DIR }}
        run: |
          sed -i "s/^  version: .*/  version: ${GITHUB_SHA}/" byte.libraries.yml
          echo "─── byte.libraries.yml after stamp ───"
          head -3 byte.libraries.yml

      - name: Build theme assets (SCSS → CSS, Lucide sprite)
        working-directory: ${{ env.THEME_DIR }}
        run: npm run build

      # ───── Render production settings.php from template ─────
      # IMPORTANT: envsubst is given an EXPLICIT variable list so it only
      # substitutes our 5 placeholders. Without it, envsubst would also
      # expand $databases, $settings, $config, $_SERVER, etc. (all PHP
      # variables in the template), corrupting the file.
      - name: Render settings.php
        env:
          DRUPAL_DB_NAME: ${{ secrets.DRUPAL_DB_NAME }}
          DRUPAL_DB_USER: ${{ secrets.DRUPAL_DB_USER }}
          DRUPAL_DB_PASS: ${{ secrets.DRUPAL_DB_PASS }}
          DRUPAL_DB_HOST: ${{ secrets.DRUPAL_DB_HOST }}
          DRUPAL_HASH_SALT: ${{ secrets.DRUPAL_HASH_SALT }}
        run: |
          envsubst '${DRUPAL_DB_NAME} ${DRUPAL_DB_USER} ${DRUPAL_DB_PASS} ${DRUPAL_DB_HOST} ${DRUPAL_HASH_SALT}' \
            < web/sites/default/settings.hostinger.php.template \
            > web/sites/default/settings.php
          chmod 644 web/sites/default/settings.php
          # Sanity 1: no unsubstituted placeholders remain
          if grep -n '\${DRUPAL_' web/sites/default/settings.php; then
            echo "::error::Unsubstituted placeholders remain in settings.php"
            exit 1
          fi
          # Sanity 2: PHP variables ($settings, $databases, $config) intact
          if ! grep -q '^\$databases' web/sites/default/settings.php; then
            echo "::error::settings.php is missing \$databases — envsubst stripped PHP vars"
            exit 1
          fi
          # Sanity 3: PHP syntax valid
          php -l web/sites/default/settings.php

      # ───── SSH setup ─────
      # HOSTINGER_KNOWN_HOSTS must contain the output of:
      #   ssh-keyscan -H -p <port> <host>
      # Without it, deploys are vulnerable to MITM on the SSH channel
      # (TOFU = trust on first use accepts whatever key the network presents).
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          name: hostinger
          known_hosts: ${{ secrets.HOSTINGER_KNOWN_HOSTS }}
          config: |
            Host hostinger
              HostName ${{ secrets.HOSTINGER_HOST }}
              Port ${{ secrets.HOSTINGER_PORT }}
              User ${{ secrets.HOSTINGER_USER }}
              IdentityFile ~/.ssh/hostinger
              IdentitiesOnly yes
              StrictHostKeyChecking yes

      # ───── Pre-deploy: relax permissions + ensure target dirs exist ─────
      - name: Pre-deploy permissions
        id: predeploy
        run: |
          ssh hostinger "
            mkdir -p ${{ secrets.HOSTINGER_PATH }}/public_html/sites/default/files \
                     ${{ secrets.HOSTINGER_PATH }}/public_html/private \
                     ${{ secrets.HOSTINGER_PATH }}/public_html/config/sync \
                     ${{ secrets.HOSTINGER_PATH }}/public_html/vendor
            chmod -R u+w ${{ secrets.HOSTINGER_PATH }}/public_html/sites/default 2>/dev/null || true
            # Clean any sed-leftover backups from manual debug edits
            rm -f ${{ secrets.HOSTINGER_PATH }}/public_html/sites/default/settings.php.bak 2>/dev/null || true

            # Symlink web → public_html. Composer autoloader bakes paths
            # like <project>/web/core/... at install time; on Hostinger our
            # docroot is public_html, so without this symlink the autoloader
            # (and drush) cannot find drupal/core. Symlink lives OUTSIDE
            # public_html so it's not web-accessible.
            if [ ! -e ${{ secrets.HOSTINGER_PATH }}/web ]; then
              echo '→ Creating symlink web → public_html'
              ln -s public_html ${{ secrets.HOSTINGER_PATH }}/web
            fi

            # Clean up old layout (vendor/config one level above) if present
            if [ -d ${{ secrets.HOSTINGER_PATH }}/vendor ] && [ ! -L ${{ secrets.HOSTINGER_PATH }}/vendor ]; then
              echo '→ Removing legacy ~/vendor (now lives at public_html/vendor)'
              rm -rf ${{ secrets.HOSTINGER_PATH }}/vendor
            fi
            if [ -d ${{ secrets.HOSTINGER_PATH }}/config ]; then
              echo '→ Removing legacy ~/config (now lives at public_html/config)'
              rm -rf ${{ secrets.HOSTINGER_PATH }}/config
            fi
          "

      # ───── Pre-deploy safety: DB snapshot + maintenance mode ─────
      # Both steps no-op on a brand-new server where the site isn't installed
      # yet (drush bootstrap != Successful). On every subsequent deploy:
      #   1. A gzipped DB dump is written to ~/db-snapshots/ on the server
      #      and rotated to keep the latest 5. If a `drush updb` later in
      #      this workflow corrupts the DB, you can `gunzip < snapshot.sql.gz
      #      | drush sqlc` to roll back to a known-good state.
      #   2. Maintenance mode is enabled so users see Drupal's maintenance
      #      page (cached HTML) instead of half-deployed code or a 5xx while
      #      rsync rewrites the docroot. It's flipped off again after the
      #      smoke test below — and on workflow failure (`if: always()`),
      #      so a broken deploy doesn't leave the site permanently dark.
      - name: Pre-deploy DB snapshot (rotated, keep last 5)
        run: |
          ssh hostinger "
            set -e
            export PATH=/opt/alt/php84/usr/bin:\$PATH
            cd ${{ secrets.HOSTINGER_PATH }}/public_html
            if ! ./vendor/bin/drush status --field=bootstrap 2>/dev/null | grep -q 'Successful'; then
              echo '⚠ Site not installed — skipping snapshot.'
              exit 0
            fi
            mkdir -p ${{ secrets.HOSTINGER_PATH }}/db-snapshots
            SNAPSHOT=${{ secrets.HOSTINGER_PATH }}/db-snapshots/jalvarez-pre-deploy-\$(date +%Y%m%d-%H%M%S).sql.gz
            ./vendor/bin/drush sql:dump --gzip --result-file=- > \$SNAPSHOT
            echo \"  ✓ Snapshot: \$SNAPSHOT (\$(du -h \$SNAPSHOT | cut -f1))\"
            ls -1t ${{ secrets.HOSTINGER_PATH }}/db-snapshots/jalvarez-pre-deploy-*.sql.gz | tail -n +6 | xargs -r rm -f
            echo '  ✓ Rotation done — keeping latest 5 snapshots.'
          "

      - name: Enable maintenance mode
        id: maintenance
        run: |
          ssh hostinger "
            export PATH=/opt/alt/php84/usr/bin:\$PATH
            cd ${{ secrets.HOSTINGER_PATH }}/public_html
            if ! ./vendor/bin/drush status --field=bootstrap 2>/dev/null | grep -q 'Successful'; then
              echo '⚠ Site not installed — skipping maintenance flag.'
              exit 0
            fi
            ./vendor/bin/drush state:set system.maintenance_mode 1 --input-format=integer
            ./vendor/bin/drush cr
            echo '  ✓ Maintenance mode ON'
          "

      # ───── Deploy: 2 rsync passes ─────
      # Sanity gate: web/vendor lives UNDER the docroot, so it relies on the
      # .htaccess that core-vendor-hardening drops to deny direct access. If
      # the file is missing (composer plugin failure, accidental delete) we
      # would expose the entire vendor tree to the web. Fail loud here rather
      # than ship a public vendor/.
      - name: Verify web/vendor hardening (.htaccess present)
        run: |
          if [ ! -f web/vendor/.htaccess ]; then
            echo "::error::web/vendor/.htaccess is missing — refusing to deploy. Run 'composer install' to regenerate."
            exit 1
          fi
          echo "✓ web/vendor/.htaccess present ($(wc -l < web/vendor/.htaccess) lines)"

      # web/ already contains web/vendor/ (composer vendor-dir = web/vendor),
      # so a single rsync of web/ → public_html/ deploys app + vendor together.
      - name: Rsync web/ → public_html/
        run: |
          rsync -avz --delete \
            --exclude-from=.deployignore \
            --exclude='sites/default/files/' \
            --exclude='private/' \
            -e "ssh" \
            ./web/ hostinger:${{ secrets.HOSTINGER_PATH }}/public_html/

      - name: Rsync config/ → public_html/config/
        run: |
          rsync -avz --delete \
            -e "ssh" \
            ./config/ hostinger:${{ secrets.HOSTINGER_PATH }}/public_html/config/

      # Drupal CMS installer (drupal_cms_installer profile) and Drupal core's
      # recipe system look for composer.json + composer.lock at the project
      # root (= dirname of DRUPAL_ROOT), and for installed recipes at
      # <project_root>/recipes/. These files are NOT web-accessible (they
      # sit one level above public_html alongside the web→public_html symlink).
      - name: Rsync composer manifests → project root
        run: |
          rsync -avz \
            -e "ssh" \
            ./composer.json ./composer.lock \
            hostinger:${{ secrets.HOSTINGER_PATH }}/

      - name: Rsync recipes/ → project root
        run: |
          if [ -d ./recipes ]; then
            rsync -avz --delete \
              -e "ssh" \
              ./recipes/ hostinger:${{ secrets.HOSTINGER_PATH }}/recipes/
          else
            echo "No ./recipes directory locally — skipping rsync."
          fi

      # ───── Post-deploy: drush updb + cim + cr (only if installed) ─────
      - name: Server diagnostics
        run: |
          ssh hostinger "
            export PATH=/opt/alt/php84/usr/bin:\$PATH
            echo '─── Path / size ───'
            pwd
            ls -la ${{ secrets.HOSTINGER_PATH }}/ | head -15
            echo ''
            echo '─── public_html/config/sync count ───'
            ls ${{ secrets.HOSTINGER_PATH }}/public_html/config/sync/ 2>/dev/null | wc -l
            echo ''
            echo '─── public_html/sites/default/settings.php (top) ───'
            head -30 ${{ secrets.HOSTINGER_PATH }}/public_html/sites/default/settings.php 2>/dev/null
            echo ''
            echo '─── drush status ───'
            cd ${{ secrets.HOSTINGER_PATH }}/public_html
            ./vendor/bin/drush status 2>&1 | head -20
            echo ''
            echo '─── drush config:status (differences) ───'
            ./vendor/bin/drush config:status 2>&1 | head -30
          " || true

      # Force target site UUID to match source — Drupal cim refuses if they
      # differ (source was exported from local DDEV; target was created by
      # `drush si` on Hostinger). One-time alignment.
      - name: Sync site UUID (source → target)
        run: |
          if [ ! -f config/sync/system.site.yml ]; then
            echo "config/sync/system.site.yml not found — skipping UUID sync"
            exit 0
          fi
          LOCAL_UUID=$(grep '^uuid:' config/sync/system.site.yml | awk '{print $2}' | tr -d '"')
          echo "Local site UUID: $LOCAL_UUID"
          ssh hostinger "
            export PATH=/opt/alt/php84/usr/bin:\$PATH
            cd ${{ secrets.HOSTINGER_PATH }}/public_html
            REMOTE=\$(./vendor/bin/drush config:get system.site uuid --format=string 2>/dev/null)
            echo \"Remote site UUID: \$REMOTE\"
            if [ \"\$REMOTE\" != \"$LOCAL_UUID\" ]; then
              ./vendor/bin/drush config:set system.site uuid $LOCAL_UUID -y
              echo '✓ Forced target uuid to match source.'
            else
              echo '= UUIDs already match.'
            fi
          "

      - name: Drupal post-deploy
        run: |
          ssh hostinger "
            set -e
            export PATH=/opt/alt/php84/usr/bin:\$PATH
            cd ${{ secrets.HOSTINGER_PATH }}/public_html
            DRUSH=./vendor/bin/drush
            if \$DRUSH status --field=bootstrap 2>/dev/null | grep -q 'Successful'; then
              echo '→ Site is installed. Running updb + cim + cr.'
              \$DRUSH updb -y
              \$DRUSH cim -y || echo '⚠ Config import skipped (no config to import).'
              \$DRUSH cr

              # Defensive repair: drush cim sometimes overwrites system.site
              # (name, mail, page.front) with stale values from local config
              # exports — page.front in particular points to a canvas_page
              # ID that doesn't exist in prod, taking down /, /es, /en.
              # The custom drush command lives inside the module
              # (src/Drush/Commands/RepairCommands.php) so it ships with the
              # rsync — no more scp+php:script dance.
              echo '→ Running post-cim system.site repair.'
              \$DRUSH jalvarez:repair-system-site || echo '⚠ Repair command failed — non-fatal, continuing.'

              # Regenerate sitemap.xml. Idempotent: simple_sitemap rebuilds
              # from queue and overwrites the served sitemap atomically.
              # No-op if the module isn't enabled yet (first deploy after
              # adding it — cim above will have enabled it).
              if \$DRUSH pm:list --status=enabled --field=name 2>/dev/null | grep -qx 'simple_sitemap'; then
                echo '→ Generating sitemap.xml.'
                \$DRUSH ssg -y || echo '⚠ Sitemap generation failed — non-fatal.'
              fi
            else
              echo '⚠ Drupal not installed yet — skipping drush hooks.'
              echo '   Run \`drush site:install\` manually once via SSH to bootstrap.'
            fi
          "

      # ───── Post-deploy smoke test ─────
      # Fail the workflow if the just-deployed site doesn't respond cleanly.
      # Without this, a broken updb / cim / cr leaves prod degraded but the
      # Action ends green and nobody notices until a user reports it.
      #
      # Three independent checks must all pass:
      #   1. drush bootstrap on the server reports Successful
      #   2. HTTPS GET returns 200
      #   3. Response body contains an actual <html document (rules out a
      #      Hostinger maintenance placeholder or LiteSpeed 5xx page)
      - name: Post-deploy smoke test
        run: |
          set -euo pipefail
          echo "─── 1. drush status (server-side bootstrap) ───"
          BOOT=$(ssh hostinger "
            export PATH=/opt/alt/php84/usr/bin:\$PATH
            cd ${{ secrets.HOSTINGER_PATH }}/public_html
            ./vendor/bin/drush status --field=bootstrap 2>/dev/null | tr -d '[:space:]'
          ") || BOOT='(ssh failed)'
          echo "  bootstrap=$BOOT"
          if [ "$BOOT" != "Successful" ]; then
            echo "::error::drush bootstrap is not 'Successful' (got: $BOOT) — site is broken"
            exit 1
          fi

          echo "─── 2. HTTPS GET https://jalvarez.tech/ ───"
          STATUS=$(curl -sko /tmp/smoke.html -w "%{http_code}" --max-time 20 "https://jalvarez.tech/" || echo "000")
          SIZE=$(wc -c < /tmp/smoke.html | tr -d '[:space:]')
          echo "  HTTP $STATUS · ${SIZE}B"
          # 301 to /es is also acceptable (language detection redirect from /).
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "302" ]; then
            echo "::error::Site returned HTTP $STATUS"
            head -20 /tmp/smoke.html || true
            exit 1
          fi

          echo "─── 3. HTTPS GET https://jalvarez.tech/es ───"
          curl -sko /tmp/smoke-es.html -w "  HTTP %{http_code} · %{size_download}B\n" --max-time 20 "https://jalvarez.tech/es"
          if ! grep -q '<html' /tmp/smoke-es.html; then
            echo "::error::Response body missing <html — likely Hostinger placeholder or 5xx"
            head -20 /tmp/smoke-es.html || true
            exit 1
          fi
          echo "✓ All smoke checks passed."

      # Always disable maintenance mode at the end, even on workflow
      # failure. Without `if: always()`, a failed `cim` would leave the
      # site permanently dark until someone SSH'd in to flip the flag.
      # `steps.maintenance.outcome == 'success'` makes sure we only
      # try to disable when we actually enabled it (skips the case
      # where the site wasn't installed and the enable step no-op'd).
      - name: Disable maintenance mode
        if: always() && steps.maintenance.outcome == 'success'
        run: |
          ssh hostinger "
            export PATH=/opt/alt/php84/usr/bin:\$PATH
            cd ${{ secrets.HOSTINGER_PATH }}/public_html
            if ! ./vendor/bin/drush status --field=bootstrap 2>/dev/null | grep -q 'Successful'; then
              echo '⚠ Site not bootstrapping — leaving maintenance flag as-is for manual triage.'
              exit 0
            fi
            ./vendor/bin/drush state:set system.maintenance_mode 0 --input-format=integer
            ./vendor/bin/drush cr
            echo '  ✓ Maintenance mode OFF'
          " || echo '⚠ Could not disable maintenance — flip it manually with: drush state:set system.maintenance_mode 0'

      # ───── Post-deploy: re-harden permissions (only if SSH was set up) ─────
      - name: Re-harden remote permissions
        if: always() && steps.predeploy.outcome == 'success'
        run: |
          ssh hostinger "
            chmod 555 ${{ secrets.HOSTINGER_PATH }}/public_html/sites/default 2>/dev/null || true
            chmod 444 ${{ secrets.HOSTINGER_PATH }}/public_html/sites/default/settings.php 2>/dev/null || true
          "

      - name: Done
        run: echo "✅ Deploy completado · https://jalvarez.tech"
