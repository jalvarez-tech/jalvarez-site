name: CI (lint + build verify + QA)

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-verify:
    name: Build verify + lint + static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      THEME_DIR: web/themes/custom/byte
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Composer validate
        run: composer validate --strict --no-check-publish

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-dev-${{ hashFiles('composer.lock') }}
          restore-keys: composer-dev-

      - name: Composer install (dev)
        run: composer install --prefer-dist --no-interaction

      - name: PHPCS (Drupal + DrupalPractice)
        run: composer phpcs

      - name: PHPStan (level 2 + Drupal extension)
        run: composer phpstan

      - name: PHPUnit (Unit testsuite)
        run: web/vendor/bin/phpunit --testsuite jalvarez-unit --do-not-cache-result

      - name: Set up Node 20 (no cache — first run, no lock)
        if: ${{ hashFiles('web/themes/custom/byte/package-lock.json') == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Node 20 (with cache)
        if: ${{ hashFiles('web/themes/custom/byte/package-lock.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/themes/custom/byte/package-lock.json

      - name: Install theme dependencies
        working-directory: ${{ env.THEME_DIR }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Build theme (SCSS + sprite)
        working-directory: ${{ env.THEME_DIR }}
        run: npm run build

      - name: Lint settings template (envsubst dry-run)
        env:
          DRUPAL_DB_NAME: test
          DRUPAL_DB_USER: test
          DRUPAL_DB_PASS: test
          DRUPAL_DB_HOST: localhost
          DRUPAL_HASH_SALT: testsalt
        run: |
          envsubst '${DRUPAL_DB_NAME} ${DRUPAL_DB_USER} ${DRUPAL_DB_PASS} ${DRUPAL_DB_HOST} ${DRUPAL_HASH_SALT}' \
            < web/sites/default/settings.hostinger.php.template \
            > /tmp/settings.rendered.php
          php -l /tmp/settings.rendered.php
          grep -q '^\$databases' /tmp/settings.rendered.php || (echo "ERROR: \$databases stripped" && exit 1)

  functional-tests:
    name: PHPUnit Functional tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-verify
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drupal_test
          MARIADB_USER: drupal
          MARIADB_PASSWORD: drupal
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      SIMPLETEST_DB: mysql://drupal:drupal@127.0.0.1:3306/drupal_test
      SIMPLETEST_BASE_URL: http://127.0.0.1:8080
      # Verbose mode dumps the offending HTML response under
      # BROWSERTEST_OUTPUT_DIRECTORY when an assertion fails — we need it
      # so the diagnostic step below can surface the body of any 500s.
      BROWSERTEST_OUTPUT_DIRECTORY: /tmp/simpletest-output
      BROWSERTEST_OUTPUT_VERBOSE: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: gd, mbstring, xml, curl, intl, pdo_mysql, zip, opcache

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-dev-${{ hashFiles('composer.lock') }}
          restore-keys: composer-dev-

      - name: Composer install (dev)
        run: composer install --prefer-dist --no-interaction

      - name: Start built-in PHP web server
        run: |
          mkdir -p /tmp/simpletest-output
          # IMPORTANT: pass ABSOLUTE paths to `-t` and the router script.
          # Drupal's installer (and tests in general) call chdir(), which
          # invalidates a relative router path on every subsequent request:
          #   PHP Fatal error: Failed opening required 'web/.ht.router.php'
          # The first request lands fine, then everything else 500s because
          # the working directory has moved. Using absolute paths keeps the
          # router resolvable regardless of the request handler's cwd.
          DOCROOT="$(pwd)/web"
          ROUTER="$DOCROOT/.ht.router.php"
          php -S 127.0.0.1:8080 -t "$DOCROOT" "$ROUTER" > /tmp/php-server.log 2>&1 &
          # Give the server a moment to bind. BrowserTestBase installs a
          # fresh Drupal in its own DB schema, so the docroot doesn't need
          # to be pre-installed — but we DO need the server to respond to
          # something before tests start (BrowserTestBase fails fast if
          # the URL is unreachable).
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sko /dev/null -w "%{http_code}" http://127.0.0.1:8080/ 2>/dev/null || echo "000")
            if [ "$STATUS" != "000" ]; then
              echo "PHP server is up (HTTP $STATUS on /)."
              break
            fi
            sleep 1
          done

      - name: PHPUnit (Functional testsuite)
        run: web/vendor/bin/phpunit --testsuite jalvarez-functional --do-not-cache-result

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "::group::PHP server log (/tmp/php-server.log)"
          tail -n 200 /tmp/php-server.log 2>/dev/null || echo "(no log)"
          echo "::endgroup::"

          echo "::group::Simpletest output directory listing"
          ls -la /tmp/simpletest-output/ 2>/dev/null || echo "(empty)"
          echo "::endgroup::"

          for f in /tmp/simpletest-output/*.html; do
            [ -f "$f" ] || continue
            echo "::group::$f (first 120 lines)"
            head -120 "$f"
            echo "::endgroup::"
          done
